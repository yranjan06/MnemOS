services:
  vm:
    build:
      context: ./backend
      dockerfile: Dockerfile
    shm_size: '2gb'
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    ports:
      - "6080:6080"   # noVNC WebSocket
      - "7878:7878"   # OculOS daemon
      - "8000:8000"   # FastAPI backend
    volumes:
      - chrome-profile:/root/.config/google-chrome
      - ./workspace:/workspace
    env_file:
      - .env
    environment:
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/google-chrome
      - DISPLAY=:99
    restart: unless-stopped
    # Future: to run N parallel VMs, extract backend.py to its own service,
    # then scale this service: docker compose up --scale vm=N

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://127.0.0.1:8000
    shm_size: '2gb'
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    ports:
      - "3000:80"
    depends_on:
      - vm
    restart: unless-stopped

volumes:
  chrome-profile:

